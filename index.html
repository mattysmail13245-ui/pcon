<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Status Monitor</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            transition: background-color 0.8s ease;
            text-align: center;
        }
        .box {
            background: rgba(0,0,0,0.3);
            padding: 50px;
            border-radius: 30px;
        }
        h1 { font-size: 4rem; margin: 0; }
        p { font-size: 1.2rem; margin-top: 15px; opacity: 0.7; }
        
        /* Zustands-Farben */
        .online { background-color: #2ecc71; }
        .offline { background-color: #e74c3c; }
        .error { background-color: #95a5a6; }
    </style>
</head>
<body id="bg" class="offline">

    <div class="box">
        <h1 id="status-text">LADE...</h1>
        <p id="debug-info">Verbindung wird aufgebaut...</p>
    </div>

    <script>
        // Deine URL von Firebase
        const URL = "https://lolses-default-rtdb.firebaseio.com/status.json";

        async function updateStatus() {
            const bg = document.getElementById("bg");
            const text = document.getElementById("status-text");
            const debug = document.getElementById("debug-info");

            try {
                const response = await fetch(URL);
                const data = await response.json();

                // Falls die Datenbank leer ist
                if (!data || !data.online) {
                    bg.className = "error";
                    text.innerText = "KEINE DATEN";
                    debug.innerText = "Datenbank liefert kein 'online' Signal.";
                    return;
                }

                const lastSeen = data.online;
                const now = Date.now() / 1000;
                const diff = now - lastSeen;

                // Wenn das Signal jünger als 20 Sekunden ist -> GRÜN
                if (diff < 20) {
                    bg.className = "online";
                    text.innerText = "PC AN";
                    debug.innerText = "Signal ist aktuell.";
                } else {
                    bg.className = "offline";
                    text.innerText = "PC AUS";
                    debug.innerText = "Letztes Signal vor " + Math.round(diff) + " Sekunden.";
                }

            } catch (err) {
                bg.className = "error";
                text.innerText = "FEHLER";
                debug.innerText = "Konnte Firebase nicht erreichen. (Check F12 Console)";
                console.error(err);
            }
        }

        // Alle 3 Sekunden prüfen
        setInterval(updateStatus, 3000);
        updateStatus();
    </script>
</body>
</html>
