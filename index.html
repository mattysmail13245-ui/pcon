<!DOCTYPE html>
<html>
<body id="bg" style="background:red; display:flex; justify-content:center; align-items:center; height:100vh;">
    <h1 id="t" style="color:white; font-family:sans-serif; font-size:50px;">PC AUS</h1>

    <script>
        const URL = "https://lolses-default-rtdb.firebaseio.com/status.json";

        async function check() {
            try {
                const res = await fetch(URL);
                const data = await res.json();
                const jetzt = Date.now() / 1000;

                // Wenn Signal jünger als 10 Sek ist -> GRÜN
                if (jetzt - data.online < 10) {
                    document.body.style.background = "green";
                    document.getElementById("t").innerText = "PC AN";
                } else {
                    document.body.style.background = "red";
                    document.getElementById("t").innerText = "PC AUS";
                }
            } catch (e) {}
        }

        setInterval(check, 3000); // Guckt alle 3 Sekunden nach
    </script>
</body>
</html>
